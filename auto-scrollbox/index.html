<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        margin: 0px;
      }
      .container-2 {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .container {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      #scroll-box {
        display: flex;
        overflow-x: auto;
        scroll-snap-type: x mandatory; /* container needs this */
        width: 100%;
        border-radius: 0.7rem;
        box-shadow: #00000040 0px 2px 2px 0px;
      }

      .card {
        scroll-snap-align: center; /* child needs this */
        flex: 0 0 100%; /* ensures it stays 90vw and doesn’t shrink */
        background-color: #222;
        color: white;
        font-size: 3rem;
        align-items: center;
        justify-content: center;
        display: flex;
        padding: 9rem 0rem;
      }
      .card > img {
        max-width: 1080px;
      }
      #progress-scroll {
        width: 500px;
        background-color: #1e1e1e;
        height: 23px;
        border-radius: 3rem;
        z-index: 99;
        margin: 0.8rem;
        padding: 0.8rem;
        box-shadow: #00000040 0px 2px 2px 0px;
      }
      #progress-overlay {
        width: 0%;
        background-color: white;
        height: 23px;
        transition: 0.22s;
        border-radius: 1rem;
      }
      .buttons-box {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        border-radius: 3rem;
        background-color: #4d4d4d;
        position: absolute;
        z-index: 200;
        margin: 1rem;
        right: 0;
        box-shadow: #00000040 0px 2px 2px 0px;
      }
      button {
        padding: 0.25rem 0.25rem;
        background: #1a1a1afa;
        box-shadow: #00000040 0px 2px 2px 0px;
        border: none;
        border-radius: 80px;
        cursor: pointer;
        width: 43px;
        height: 43px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s ease-in-out;
      }

      button:hover {
        background: #444444fe;
      }
      .direction {
        border-radius: 40rem;
        box-shadow: #00000040 2px 2px 2px;
        background-color: #1e1e1e;
        color: white;
      }
      .direction:hover {
        background-color: #fefefe;
        color: black;
        cursor: pointer;
        text-decoration: underline;
      }
      .flex-box {
        display: flex;
      }
      #prev {
        margin-right: 0.25rem;
        margin-left: 1rem;
      }
      #next {
        margin-left: 0.25rem;
        margin-right: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="container-2">
      <div class="container">
        <div id="scroll-box">
          <div class="buttons-box">
            <div id="progress-scroll">
              <div id="progress-overlay"></div>
            </div>
            <div class="flex-box">
              <button id="prev" class="direction">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M15 18L9 12L15 6"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </button>
              <button id="next" class="direction">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M9 6L15 12L9 18"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </button>
            </div>
          </div>
          <div class="card"><img src="rita.png" alt="" width="100%" /></div>
          <div class="card"><img src="milo.png" alt="" width="100%" /></div>
          <div class="card"><img src="nl.png" alt="" width="100%" /></div>
        </div>
      </div>
    </div>
    <script defer src="js/scroller.js"></script>
  </body>
</html>
