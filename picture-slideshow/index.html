<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scroll Buttons with Progress Bars</title>
  <link href="css/style.css" rel="stylesheet" />
  <style>
    .scroll-container {
      position: relative;
      max-width: 703px;
      border-radius: 8px;
      margin-bottom: 3rem;
    }

    /* Progress bar container */
    .progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 4px;
      width: 100%;
      background: #ffffff33; /* translucent track */
      border-radius: 4px;
      overflow: hidden;
      z-index: 15;
    }

    /* Fill of progress bar */
    .progress-fill {
      height: 100%;
      width: 0%;
      background: skyblue;
      transition: width 0.15s ease-out;
    }

    .scroll-box {
      display: flex;
      flex-direction: row;
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      width: 100%;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
      border-radius: 8px;
    }

    .scroll-box::-webkit-scrollbar {
      display: none;
    }

    .card {
      flex: 0 0 auto;
      background-color: black;
      width: 100%;
      height: 100%;
      margin: 0px;
      border-radius: 8px;
      scroll-snap-align: start;
      color: white;
    }

    .card img {
        display: block;
    }

    .buttons-box {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
      z-index: 10;
    }

    button {
      padding: 0.25rem 0.25rem;
      background: #1a1a1aFA;
      box-shadow: #00000040 0px 2px 2px 0px;
      border: none;
      border-radius: 80px;
      cursor: pointer;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease-in-out;
    }

    button:hover {
      background: #444444fe;
    }
  </style>
</head>
<body>
  <!-- First scroll box -->
  <div class="scroll-container">
    <div class="progress-bar">
      <div class="progress-fill" id="progress1"></div>
    </div>

    <div class="scroll-box" id="scrollBox">
      <div class="card"><img src="campaigns.png" width="100%" alt=""></div>
      <div class="card"><img src="events.png" width="100%" alt=""></div>
      <div class="card"><img src="orgs.png" width="100%" alt=""></div>
      <div class="card"><img src="demo.png" width="100%" alt=""></div>
      <div class="card"><img src="campaigns.png" width="100%" alt=""></div>
      <div class="card"><img src="events.png" width="100%" alt=""></div>
    </div>

    <div class="buttons-box">
      <button id="leftBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="white">
          <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
        </svg>
      </button>
      <button id="rightBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="white">
          <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Second scroll box -->
  <div class="scroll-container">
    <div class="progress-bar">
      <div class="progress-fill" id="progress2"></div>
    </div>

    <div class="scroll-box" id="scrollBox1">
      <div class="card"><img src="campaigns.png" width="100%" alt=""></div>
      <div class="card"><img src="events.png" width="100%" alt=""></div>
      <div class="card"><img src="orgs.png" width="100%" alt=""></div>
      <div class="card"><img src="events.png" width="100%" alt=""></div>
      <div class="card"><img src="campaigns.png" width="100%" alt=""></div>
      <div class="card"><img src="events.png" width="100%" alt=""></div>
    </div>

    <div class="buttons-box">
      <button id="leftBtn1">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="white">
          <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
        </svg>
      </button>
      <button id="rightBtn1">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="white">
          <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z" />
        </svg>
      </button>
    </div>
  </div>

    <script>
        function setupScroll(boxId, leftBtnId, rightBtnId, progressId) {
            const box = document.getElementById(boxId);
            const leftBtn = document.getElementById(leftBtnId);
            const rightBtn = document.getElementById(rightBtnId);
            const progress = document.getElementById(progressId);

            const updateProgress = () => {
            const total = box.scrollWidth - box.clientWidth;
            progress.style.width = (box.scrollLeft / total) * 100 + '%';
            };

            const slide = () => box.querySelector('.card')?.clientWidth || 0;

            leftBtn.onclick = () => box.scrollBy({ left: -slide() });
            rightBtn.onclick = () => box.scrollBy({ left: slide() });
            box.addEventListener('scroll', updateProgress);
            window.addEventListener('resize', updateProgress);
        }

        setupScroll('scrollBox', 'leftBtn', 'rightBtn', 'progress1');
        setupScroll('scrollBox1', 'leftBtn1', 'rightBtn1', 'progress2');
    </script>

</body>
</html>
