<!doctype html>
<html>
<head>
<style>

html, body {
  height: 100%;
  overflow: hidden;
}
body {
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000000fe;
  font-family: 'Atkinson Hyperlegible', sans-serif;
}

* {
  box-sizing: border-box;
}

.slider {
  width: 1900px;
  text-align: center;
  overflow: hidden;
}

.slides {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scroll-behavior: auto; /* Change the scrolling nature of the links and slides */
  -webkit-overflow-scrolling: touch;
  scroll-snap-points-x: repeat(300px);
  scroll-snap-type: mandatory;
  margin-bottom: 19px;
}
.slides::-webkit-scrollbar {
  display: none;
}

.slides > div {
  scroll-snap-align: center;
  flex-shrink: 0;
  width: 70%;
  height: 75vh;
  margin-right: 50px;
  margin-left: 50px;
  border-radius: 10px;
  background: #eee;
  /*transform-origin: center center;
  /*transform: scale(1);
  /*transition: transform 0.01s;*/
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 100px;
  /* Default dim effect on slides */
  transition: opacity 0.477s ease, transform 0.477s ease;
  opacity: 0.4; /* Dimmed by default */
  transform: scale(1); /* Slightly shrink slides out of view */
}

.slides > div.in-view {
  opacity: 1; /* Full opacity for the slide in view */
  transform: scale(1); /* Normal size for the slide in view */
}

/* Optional: You can also add a slight grayscale or filter for more dimming effect */
.slides > div.out-of-view {
  filter: grayscale(70%) brightness(0.4);
  transform: scale(0.95); /* Normal size for the slide in view */
}


img {
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

.slider > a {
  font-size: 1.2rem;
  padding: 20px 49px;
  display: inline flex;
  width: 3.5rem;
  height: 3.5rem;
  background: #000;
  color: #555	;
  text-decoration: none;
  align-items: center;
  justify-content: center;
  border-radius: 7px;
  margin: 0 0 0.5rem 0;
  margin: 17px;
  position: relative;
}
.slider > a:hover {
  text-decoration: underline;
  outline: 1px solid grey;
  color: #fff;
}
.slider > a:active {
  /*top: 1px;*/
  outline: 1px solid white;
  background-color: #222;
  color: #fff;
}
.slider > a:focused {
  outline: 1px solid white;
  background: #222;
  color: #fff;
}
.slider > a:target {
  background: #222;
  color: #fff;
}

/* Active button styling */
a:focus {
  background-color: #ff9800; /* Highlight the active button */
}

/* Mimic hover state when the slide is in view */
a.hovered {
  background-color: #000; /* Or whatever hover style you want */
  color: #fff;
  outline: 1px solid white;
}

/* Don't need button navigation 
@supports (scroll-snap-type) {
  .slider > a {
    display: none;
  }
}*/

</style>
</head>
<body>
<div class="slider">
  <div class="slides">
    <div id="slide-1">
      Lorem
    </div>
    <div id="slide-2">
      Ipsum
    </div>
    <div id="slide-3">
      Item
    </div>
    <div id="slide-4">
      Project
    </div>
    <div id="slide-5">
      Thing
    </div>
  </div>
  <a href="#slide-1" id="nav-slide-1">Lorem</a>
  <a href="#slide-2" id="nav-slide-2">Ipsum</a>
  <a href="#slide-3" id="nav-slide-3">Item</a>
  <a href="#slide-4" id="nav-slide-4">Project</a>
  <a href="#slide-5" id="nav-slide-5">Thing</a>
</div>
<script src="hovered.js"></script>
</body>
</html>
